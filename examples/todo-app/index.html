<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidJS Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 20px; }
    .add-todo { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-todo input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    .add-todo button { padding: 8px 16px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-btn { padding: 4px 12px; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; cursor: pointer; }
    .filter-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #e5e7eb; }
    .todo-label { flex: 1; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .delete-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #ef4444; padding: 0 8px; }
    .footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; color: #6b7280; font-size: 14px; }
    .footer button { background: none; border: 1px solid #d1d5db; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
