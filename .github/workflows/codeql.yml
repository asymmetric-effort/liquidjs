name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go]
        include:
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: autobuild
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c29f4eedf1fb43be1c9b9611f2e861ca03ad0008 # v3.28.16
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@c29f4eedf1fb43be1c9b9611f2e861ca03ad0008 # v3.28.16

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c29f4eedf1fb43be1c9b9611f2e861ca03ad0008 # v3.28.16
        with:
          category: /language:${{ matrix.language }}
