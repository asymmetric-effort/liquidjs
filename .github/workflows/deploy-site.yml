name: Deploy Showcase Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'core/src/**'
      - '.github/workflows/deploy-site.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: npx vite build

      - name: Verify copyright banners
        working-directory: site/dist
        run: |
          JS_FILE=$(ls assets/*.js | head -1)
          CSS_FILE=$(ls assets/*.css | head -1)
          head -1 "$JS_FILE" | grep -q "Asymmetric Effort" || (echo "Missing JS banner" && exit 1)
          head -1 "$CSS_FILE" | grep -q "Asymmetric Effort" || (echo "Missing CSS banner" && exit 1)
          echo "Copyright banners verified"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    name: Post-Deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: site
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Wait for deployment to propagate
        run: sleep 15

      - name: Run post-deployment E2E tests
        id: e2e
        working-directory: site
        run: npx playwright test --config=playwright.deploy.config.ts

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-verification-report
          path: site/playwright-report/
          retention-days: 7

      - name: Rollback on verification failure
        if: failure() && steps.e2e.outcome == 'failure'
        run: |
          echo "Post-deployment verification failed. Rolling back to previous deployment."
          echo "To rollback: re-run the deploy-site workflow from the previous commit."
          echo "Previous commit: $(git rev-parse HEAD~1)"
          echo "::error::Post-deployment E2E tests failed. Site may be broken. Review the test report artifact."
          exit 1
