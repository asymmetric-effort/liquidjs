name: Deploy Showcase Site

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: npx vite build

      - name: Verify copyright banners
        working-directory: site/dist
        run: |
          JS_FILE=$(ls assets/*.js | head -1)
          CSS_FILE=$(ls assets/*.css | head -1)
          head -1 "$JS_FILE" | grep -q "Asymmetric Effort" || (echo "Missing JS banner" && exit 1)
          head -1 "$CSS_FILE" | grep -q "Asymmetric Effort" || (echo "Missing CSS banner" && exit 1)
          echo "Copyright banners verified"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  verify:
    name: Post-Deployment Verification
    if: false # Temporarily disabled — GitHub Pages CDN caching stale content after domain rename
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: site
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Wait for CDN cache purge
        run: |
          echo "Waiting 120s for GitHub Pages CDN to purge cached content..."
          sleep 120

      - name: Run post-deployment E2E tests
        id: e2e
        working-directory: site
        run: npx playwright test --config=playwright.deploy.config.ts

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deployment-verification-report
          path: site/playwright-report/
          retention-days: 7

      - name: Rollback on verification failure
        if: failure() && steps.e2e.outcome == 'failure'
        run: |
          echo "Post-deployment verification failed. Rolling back to previous deployment."
          echo "To rollback: re-run the deploy-site workflow from the previous commit."
          echo "Previous commit: $(git rev-parse HEAD~1)"
          echo "::error::Post-deployment E2E tests failed. Site may be broken. Review the test report artifact."
          exit 1
