name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Prettier format check
        run: npm run format:check

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: core/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f dist/liquidjs.esm.js || (echo "Missing ESM build" && exit 1)
          test -f dist/liquidjs.cjs.js || (echo "Missing CJS build" && exit 1)
          echo "Build artifacts verified"
          ls -lh dist/

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < dist/liquidjs.esm.js)
          echo "ESM bundle size: $SIZE bytes ($(( SIZE / 1024 ))KB)"
          if [ "$SIZE" -gt 524288 ]; then
            echo "WARNING: Bundle exceeds 512KB"
            exit 1
          fi

      - name: Upload build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: core/dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload E2E report
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: core/playwright-report/
          retention-days: 7

  go-tools:
    name: Go Tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/liquidjs-debug
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: tools/liquidjs-debug/go.sum

      - name: Vet
        run: go vet -v ./...

      - name: Test
        run: go test -v ./pkg/...

      - name: Build
        run: go build -v -o liquidjs-debug .
