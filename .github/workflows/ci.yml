name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        run: bun run typecheck

      - name: Prettier format check
        run: bun run format:check

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        if: always() && !env.ACT
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: core/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        run: bun run build

      - name: Verify build output exists
        run: |
          test -f dist/liquidjs.esm.js || (echo "Missing ESM build" && exit 1)
          test -f dist/liquidjs.cjs.js || (echo "Missing CJS build" && exit 1)
          test -f dist/liquidjs.d.ts || (echo "Missing type declarations" && exit 1)
          echo "Build artifacts verified"
          ls -lh dist/

      - name: Check bundle size (< 15KB gzipped)
        run: |
          gzip -k dist/liquidjs.esm.js
          SIZE=$(wc -c < dist/liquidjs.esm.js.gz)
          echo "ESM bundle gzipped: $SIZE bytes ($(( SIZE / 1024 ))KB)"
          rm dist/liquidjs.esm.js.gz
          if [ "$SIZE" -gt 15360 ]; then
            echo "ERROR: Bundle exceeds 15KB gzipped"
            exit 1
          fi

      - name: Upload build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: core/dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun x playwright install ${{ matrix.browser }} --with-deps

      - name: Run E2E tests (${{ matrix.browser }})
        run: bun x playwright test --project=${{ matrix.browser }}

      - name: Upload E2E report
        if: always() && !env.ACT
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ matrix.browser }}
          path: core/playwright-report/
          retention-days: 7

  go-tools:
    name: Go Tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/liquidjs-debug
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.24'
          cache-dependency-path: tools/liquidjs-debug/go.sum

      - name: Vet
        run: go vet -v ./...

      - name: Test
        run: go test -v ./pkg/...

      - name: Build
        run: go build -v -o liquidjs-debug .
