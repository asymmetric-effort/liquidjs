name: Full CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Lint ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: asymmetric-effort/actions/actions/setup-bun@140e9f8400b24e9a8412d8ab5968e62052926c54 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run format:check

  # ── Stage 2: Test ───────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: asymmetric-effort/actions/actions/setup-bun@140e9f8400b24e9a8412d8ab5968e62052926c54 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage
      - name: Upload coverage
        if: always() && !env.ACT
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: core/coverage/
          retention-days: 7

  # ── Stage 3: Build ──────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: asymmetric-effort/actions/actions/setup-bun@140e9f8400b24e9a8412d8ab5968e62052926c54 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify build
        run: |
          test -f dist/specifyjs.esm.js && test -f dist/specifyjs.cjs.js && test -f dist/specifyjs.d.ts
          gzip -k dist/specifyjs.esm.js
          SIZE=$(wc -c < dist/specifyjs.esm.js.gz)
          echo "ESM gzipped: $SIZE bytes"
          rm dist/specifyjs.esm.js.gz
          [ "$SIZE" -le 15360 ] || (echo "ERROR: Bundle exceeds 15KB" && exit 1)
      - name: Upload build
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: core/dist/
          retention-days: 7

  # ── Stage 4: E2E ────────────────────────────────────────────────────
  e2e:
    name: E2E (${{ matrix.browser }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: asymmetric-effort/actions/actions/setup-bun@140e9f8400b24e9a8412d8ab5968e62052926c54 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun x playwright install ${{ matrix.browser }} --with-deps
      - run: bun x playwright test --project=${{ matrix.browser }}

  # ── Stage 5: Build Site (not on PRs) ────────────────────────────────
  build-site:
    name: Build Showcase Site
    needs: e2e
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Build
        working-directory: site
        run: |
          npm install
          npx vite build
      - name: Verify banners
        working-directory: site/dist
        run: |
          head -1 assets/*.js | grep -q "Asymmetric Effort" || exit 1
          head -1 assets/*.css | grep -q "Asymmetric Effort" || exit 1
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/dist

  # ── Stage 6: Deploy Site (not on PRs) ───────────────────────────────
  deploy:
    name: Deploy Showcase Site
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  # ── Stage 7: PDV (not on PRs) ──────────────────────────────────────
  pdv:
    name: Post-Deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Install Playwright
        working-directory: site
        run: |
          npm install
          npx playwright install chromium --with-deps
      - name: Wait for CDN
        run: |
          for i in $(seq 1 30); do
            JS=$(curl -sk "https://specifyjs.asymmetric-effort.com/?_cb=$(date +%s%N)" | grep -oP 'assets/index-[^"]+\.js' || true)
            if [ -n "$JS" ]; then
              if curl -sk "https://specifyjs.asymmetric-effort.com/$JS" | grep -q 'SpecifyJS'; then
                echo "Fresh content confirmed after ${i}0s"; exit 0
              fi
            fi
            echo "Attempt $i/30..."; sleep 10
          done
      - name: Run PDV E2E
        id: e2e
        working-directory: site
        run: npx playwright test --config=playwright.deploy.config.ts
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pdv-report
          path: site/playwright-report/
          retention-days: 7

  # ── Stage 8: Publish to npm (ONLY tagged builds, after PDV) ─────────
  publish:
    name: Publish to npm
    needs: pdv
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - uses: asymmetric-effort/actions/actions/setup-bun@140e9f8400b24e9a8412d8ab5968e62052926c54 # main
        with:
          bun-version: latest

      - name: Configure npm for OIDC
        run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Build
        working-directory: core
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./core/package.json').version")
          [ "$TAG" = "$PKG" ] || (echo "Tag v$TAG != package.json $PKG" && exit 1)
          echo "Version: $PKG"

      - name: Publish @asymmetric-effort/specifyjs
        working-directory: core
        run: npx npm@latest publish --provenance --access public

      - name: Verify npm publish
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Waiting for npm registry to reflect v$TAG..."
          for i in $(seq 1 10); do
            LATEST=$(npm view @asymmetric-effort/specifyjs version 2>/dev/null || echo "")
            if [ "$LATEST" = "$TAG" ]; then
              echo "Verified: @asymmetric-effort/specifyjs@$TAG is live on npm"
              exit 0
            fi
            echo "Attempt $i/10: latest=$LATEST, expected=$TAG"; sleep 5
          done
          echo "WARNING: npm may still be propagating"
