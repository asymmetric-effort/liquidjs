name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac25514ed1b867c1f36070283ac3a3f2ffb0 # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build library
        run: bun run build

      - name: Verify build
        run: |
          test -f dist/liquidjs.esm.js
          test -f dist/liquidjs.cjs.js
          test -f dist/liquidjs.d.ts
          echo "Build verified"
          ls -lh dist/

      - uses: actions/setup-node@48b55a068e5ee264b836c3e5ea9a0c3b74b294fb # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            core/dist/liquidjs.esm.js \
            core/dist/liquidjs.cjs.js
