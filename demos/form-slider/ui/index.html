<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecifyJS Slider Demo</title>
  <style>
    :root { --bg: #f9fafb; --fg: #1f2937; --card: #fff; --border: #e5e7eb; --accent: #3b82f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
    .app { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
    .demo-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .demo-section h2 { font-size: 16px; margin-bottom: 12px; color: #374151; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .controls label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #6b7280; cursor: pointer; }
    .controls input[type="checkbox"] { cursor: pointer; }
    .output { margin-top: 12px; padding: 8px 12px; background: #f3f4f6; border-radius: 6px; font-size: 13px; font-family: monospace; color: #374151; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
