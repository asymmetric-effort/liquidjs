<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidJS Tooltip Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1f2937; min-height: 100vh; }
    .demo { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 32px; }
    h2 { font-size: 18px; margin-bottom: 12px; color: #374151; }
    .demo-section { margin-bottom: 32px; padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #e5e7eb; }
    .btn { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #374151; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #f3f4f6; }
    .btn-primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .btn-active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 4px 10px; background: #e0e7ff; color: #4338ca; border-radius: 12px; font-size: 13px; font-weight: 500; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
