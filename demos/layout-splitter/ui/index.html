<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidJS Splitter Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1f2937; min-height: 100vh; }
    .demo-app { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .controls { display: flex; flex-wrap: wrap; gap: 16px; padding: 16px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; align-items: center; }
    .controls label { display: flex; align-items: center; gap: 6px; font-size: 14px; white-space: nowrap; }
    .controls select, .controls input[type="number"] { padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; }
    .splitter__divider:hover { background-color: #3b82f6 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
