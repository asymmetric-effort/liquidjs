<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecifyJS Protobuf Task Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    h1 { font-size: 26px; margin-bottom: 4px; color: #f1f5f9; }
    .subtitle { color: #64748b; margin-bottom: 20px; font-size: 13px; }

    /* Add task form */
    .add-form { display: grid; grid-template-columns: 1fr 1fr 120px 80px; gap: 8px; margin-bottom: 24px; padding: 16px; background: #1e293b; border-radius: 10px; border: 1px solid #334155; }
    .add-form input, .add-form select { padding: 10px; border: 1px solid #334155; border-radius: 6px; font-size: 13px; background: #0f172a; color: #e2e8f0; }
    .add-form input::placeholder { color: #475569; }
    .add-form .desc-row { grid-column: 1 / -1; }
    .add-btn { padding: 10px; background: #6366f1; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .add-btn:hover { background: #4f46e5; }

    /* Kanban board */
    .board { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .column { background: #1e293b; border-radius: 10px; padding: 16px; border: 1px solid #334155; min-height: 200px; }
    .column-header { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    .column-header .count { font-size: 12px; font-weight: 400; color: #64748b; background: #334155; padding: 2px 8px; border-radius: 10px; }
    .col-pending .column-header { color: #fbbf24; border-bottom-color: #fbbf24; }
    .col-progress .column-header { color: #38bdf8; border-bottom-color: #38bdf8; }
    .col-done .column-header { color: #4ade80; border-bottom-color: #4ade80; }

    /* Task cards */
    .task-card { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; transition: border-color 0.15s; }
    .task-card:hover { border-color: #6366f1; }
    .task-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #f1f5f9; }
    .task-desc { font-size: 12px; color: #94a3b8; margin-bottom: 8px; line-height: 1.4; }
    .task-meta { display: flex; justify-content: space-between; align-items: center; }
    .priority { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    .priority-1 { background: #1e3a2f; color: #4ade80; }
    .priority-2 { background: #1e3a3a; color: #38bdf8; }
    .priority-3 { background: #2e2a1e; color: #fbbf24; }
    .priority-4 { background: #2e1e1e; color: #f87171; }
    .priority-5 { background: #3b1e2e; color: #f472b6; }
    .task-actions { display: flex; gap: 4px; }
    .task-actions button { padding: 3px 8px; font-size: 11px; border: 1px solid #334155; border-radius: 4px; background: #1e293b; color: #94a3b8; cursor: pointer; }
    .task-actions button:hover { background: #334155; color: #e2e8f0; }
    .task-actions .delete-btn:hover { background: #7f1d1d; color: #fca5a5; border-color: #7f1d1d; }

    /* Raw bytes panel */
    .bytes-panel { background: #1e293b; border-radius: 10px; padding: 16px; border: 1px solid #334155; margin-bottom: 16px; }
    .bytes-panel h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .bytes-display { font-family: 'Fira Code', 'Cascadia Code', 'SF Mono', monospace; font-size: 11px; line-height: 1.6; color: #38bdf8; background: #0f172a; padding: 12px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }
    .bytes-display .hex-byte { color: #6366f1; }
    .bytes-display .label { color: #64748b; }
    .bytes-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: #64748b; }

    .error { padding: 12px; background: #7f1d1d; color: #fca5a5; border-radius: 8px; margin-bottom: 16px; }
    .loading { text-align: center; padding: 32px; color: #64748b; }

    footer { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; color: #64748b; font-size: 13px; border-top: 1px solid #334155; }
    .refresh-btn { background: none; border: 1px solid #334155; padding: 4px 12px; border-radius: 6px; cursor: pointer; color: #94a3b8; }
    .refresh-btn:hover { background: #334155; color: #e2e8f0; }

    @media (max-width: 768px) {
      .board { grid-template-columns: 1fr; }
      .add-form { grid-template-columns: 1fr 1fr; }
      .add-btn { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
