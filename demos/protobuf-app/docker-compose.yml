services:
  api:
    build:
      context: ../..
      dockerfile: demos/protobuf-app/api/Dockerfile
    expose:
      - "8080"
    restart: unless-stopped

  ui:
    build:
      context: ../..
      dockerfile: demos/protobuf-app/ui/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
