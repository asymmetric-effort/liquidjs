<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecifyJS Toast Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1f2937; min-height: 100vh; }
    .demo { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 32px; }
    h2 { font-size: 18px; margin-bottom: 12px; color: #374151; }
    .demo-section { margin-bottom: 32px; padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #e5e7eb; }
    .btn { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #374151; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #f3f4f6; }
    .btn-info { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
    .btn-success { background: #f0fdf4; color: #15803d; border-color: #86efac; }
    .btn-warning { background: #fffbeb; color: #a16207; border-color: #fcd34d; }
    .btn-error { background: #fef2f2; color: #b91c1c; border-color: #fca5a5; }
    .btn-danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
