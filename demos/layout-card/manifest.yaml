name: layout-card
description: Interactive demo of the Card component with title, subtitle, image, footer, and configurable shadow/border/hover
features:
  - Card with header, body, and footer slots
  - Top image with alt text
  - Header action slot
  - Configurable shadow, border, padding, radius
  - Hoverable effect
  - useState for interactive controls
containers: 1
ports:
  - "3000:80"
