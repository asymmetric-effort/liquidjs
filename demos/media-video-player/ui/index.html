<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidJS VideoPlayer Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1f2937; min-height: 100vh; }
    .app { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 24px; }
    h2 { font-size: 20px; margin-bottom: 16px; }
    h3 { font-size: 14px; color: #6b7280; margin: 12px 0 6px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .controls button { padding: 6px 16px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; }
    .controls button:hover { background: #f3f4f6; }
    .controls label { display: flex; align-items: center; gap: 4px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
