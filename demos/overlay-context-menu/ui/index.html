<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidJS Context Menu Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1f2937; min-height: 100vh; }
    .demo { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h2 { font-size: 18px; margin-bottom: 12px; color: #374151; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
    .demo-section { margin-bottom: 32px; padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #e5e7eb; }
    .trigger-area { padding: 40px; border: 2px dashed #d1d5db; border-radius: 8px; text-align: center; cursor: context-menu; user-select: none; }
    .trigger-area:hover { border-color: #3b82f6; background: #eff6ff; }
    .trigger-area-alt { border-color: #a78bfa; }
    .trigger-area-alt:hover { border-color: #7c3aed; background: #f5f3ff; }
    .hint { font-size: 13px; color: #9ca3af; margin-top: 8px; }
    .feature-list { list-style: none; }
    .feature-list li { padding: 6px 0; font-size: 14px; color: #4b5563; }
    .feature-list li::before { content: "- "; color: #9ca3af; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
