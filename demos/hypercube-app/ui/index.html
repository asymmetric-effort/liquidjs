<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecifyJS Hypercube Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e293b; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
    .app { max-width: 700px; width: 100%; display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .controls { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .control { display: flex; align-items: center; gap: 12px; }
    .control label { min-width: 180px; font-size: 14px; }
    .control input[type="range"] { flex: 1; accent-color: #3b82f6; }
    .control input[type="checkbox"] { accent-color: #3b82f6; }
    .info { font-size: 12px; color: #94a3b8; white-space: nowrap; }
    svg { border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
</body>
</html>
