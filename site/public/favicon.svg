<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="droplet-clip">
      <path d="M32 4 C32 4, 12 28, 12 40 C12 51.05 20.95 60 32 60 C43.05 60 52 51.05 52 40 C52 28, 32 4, 32 4 Z"/>
    </clipPath>
  </defs>
  <!-- Blue droplet body -->
  <path d="M32 4 C32 4, 12 28, 12 40 C12 51.05 20.95 60 32 60 C43.05 60 52 51.05 52 40 C52 28, 32 4, 32 4 Z"
        fill="#3b82f6"/>
  <!-- Highlight -->
